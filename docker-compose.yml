name: session

services:
  database:
    image: postgres:16
    container_name: session_management_db
    restart: always
    env_file: ./backend/.env
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/data

  backend:
    build:
      context: ./backend
      dockerfile: dockerfile
    ports:
      - "9001:9000"
    depends_on:
      - database
    command: sh -c "npm run build && npm run migration:run && npm run seed && npm run start:dev"
    env_file: ./backend/.env

  frontend:
    build:
      context: ./frontend
      dockerfile: dockerfile
    ports:
      - "3001:3000"
    command: npm run dev
    depends_on:
      - backend
    env_file: ./frontend/.env

volumes:
  postgres_data:
